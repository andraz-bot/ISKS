<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graf</title>
</head>
<body>
    Primer z grafom:
    <br>
    <canvas id = "platno-1" width = "800" height = "100" style = "border: 1px dashed #099999"></canvas>

    <script>
        "use strict";

        let can1, platno1;
        
        can1 = document.getElementById("platno-1");
        platno1 = can1.getContext("2d");

        platno1.strokeStyle = "#FF0000";
        platno1.beginPath();
        platno1.lineTo(10,70);
        platno1.lineTo(110,35);
        platno1.lineTo(210,50);
        platno1.lineTo(310,25);
        platno1.lineTo(410,45);
        platno1.lineTo(510,15);
        platno1.stroke();

    </script>
    
</body>
</html>
