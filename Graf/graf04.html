<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graf</title>
</head>
<body>
    Primer z grafom:
    <br>
    <canvas id = "platno-1" width = "800" height = "100" style = "border: 1px dashed #099999"></canvas>

    <script>
        "use strict";

        let can1, platno1;
        
        can1 = document.getElementById("platno-1");
        platno1 = can1.getContext("2d");

        let x = new Array();
        let y = new Array();

        x=[10,110,210,310,410,510];
        y=[70,35,50,25,45,15];


        platno1.strokeStyle = "#FF0000";
        platno1.beginPath();

        for(let i = 0; i<y.length; i++){
            platno1.lineTo(x[i], y[i]);
        }

        
        platno1.stroke();

    </script>
    
</body>
</html>
